[tool.poetry]
name = "bibliogon"
version = "0.15.0"
description = "Open-source book authoring platform with WYSIWYG and Markdown editing, EPUB/PDF export via Pandoc."
authors = ["Asterios Raptis"]
license = "MIT"
package-mode = false

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.115.0"
uvicorn = { extras = ["standard"], version = "^0.32.0" }
sqlalchemy = "^2.0.0"
pydantic = "^2.0.0"
python-multipart = "^0.0.12"
pluginforge = {version = "^0.5.0", extras = ["fastapi"]}
bibliogon-plugin-export = {path = "../plugins/bibliogon-plugin-export", develop = true}
bibliogon-plugin-help = {path = "../plugins/bibliogon-plugin-help", develop = true}
bibliogon-plugin-getstarted = {path = "../plugins/bibliogon-plugin-getstarted", develop = true}
bibliogon-plugin-ms-tools = {path = "../plugins/bibliogon-plugin-ms-tools", develop = true}
markdown = "^3.10.2"
alembic = "^1.18.4"
pillow = "^11.0.0"
gtts = "^2.5.0"
pyttsx3 = "^2.90"
elevenlabs = "^0.2.27"
cryptography = "^46.0.7"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
httpx = "^0.27.0"
mutmut = "^3.5.0"
mypy = "^1.20.0"
types-pyyaml = "^6.0.12.20250915"
types-markdown = "^3.10.2.20260211"
pytest-asyncio = "^1.3.0"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]

[[tool.mypy.overrides]]
module = "pluginforge.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bibliogon_export.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bibliogon_help.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bibliogon_getstarted.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bibliogon_ms_tools.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bibliogon_grammar.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bibliogon_kinderbuch.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "bibliogon_kdp.*"
ignore_missing_imports = true

[tool.mutmut]
paths_to_mutate = ["app/"]
tests_dir = ["tests/"]
do_not_mutate = ["app/main.py", "app/database.py"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
