app:
  name: Bibliogon
  version: 0.10.0
  description: Open-source book authoring platform
  default_language: en
  delete_permanently: false
  trash_auto_delete_enabled: true
  trash_auto_delete_days: 90
  supported_languages:
  - de
  - en
  - es
  - fr
  - el
  - pt
  - tr
  - ja
author:
  name: Asterios Raptis
  pen_names:
  - Draven Quantum
  - Stelio Moon
plugins:
  entry_point_group: bibliogon.plugins
  config_dir: config/plugins
  enabled:
  - export
  - help
  - getstarted
  - ms-tools
  - kinderbuch
  - audiobook
  disabled: []
ai:
  base_url: "http://localhost:11434/v1"
  model: ""
  temperature: 0.7
  max_tokens: 2048
  api_key: ""
ui:
  title: Bibliogon
  subtitle: Bücher schreiben und exportieren
  logo: assets/logo.svg
  theme: nord
