plugin:
  name: "kdp"
  display_name:
    de: "Amazon KDP"
    en: "Amazon KDP"
  description:
    de: "KDP-Metadaten, Cover-Validierung und Vorschau"
    en: "KDP metadata, cover validation, and preview"
  version: "1.0.0"
  license: "Proprietary"
  depends_on: ["export"]
  api_version: "1"

settings:
  # KDP cover requirements
  cover:
    min_width: 625
    min_height: 1000
    max_width: 10000
    max_height: 10000
    min_dpi: 300
    aspect_ratio_min: 1.5  # height/width
    aspect_ratio_max: 1.8
    max_file_size_mb: 50
    allowed_formats: ["jpg", "jpeg", "tiff", "png"]

  # KDP manuscript requirements
  manuscript:
    min_pages: 24
    max_pages: 828
    supported_formats: ["epub", "pdf", "docx"]

  # KDP categories
  categories:
    - "Arts & Photography"
    - "Biographies & Memoirs"
    - "Business & Money"
    - "Children's eBooks"
    - "Comics & Graphic Novels"
    - "Computers & Technology"
    - "Cookbooks, Food & Wine"
    - "Education & Teaching"
    - "Engineering & Transportation"
    - "Health, Fitness & Dieting"
    - "History"
    - "Humor & Entertainment"
    - "Law"
    - "Literature & Fiction"
    - "Mystery, Thriller & Suspense"
    - "Parenting & Relationships"
    - "Politics & Social Sciences"
    - "Reference"
    - "Religion & Spirituality"
    - "Romance"
    - "Science & Math"
    - "Science Fiction & Fantasy"
    - "Self-Help"
    - "Sports & Outdoors"
    - "Teen & Young Adult"
    - "Travel"
