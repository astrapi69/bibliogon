plugin:
  name: "help"
  display_name:
    de: "Hilfe"
    en: "Help"
  description:
    de: "In-App Hilfe, Tastenkürzel und FAQ"
    en: "In-app help, keyboard shortcuts, and FAQ"
  version: "1.0.0"
  license: "MIT"
  depends_on: []
  api_version: "1"

shortcuts:
  # --- Text-Formatierung ---
  - keys: "Ctrl+B"
    action: {de: "Fett", en: "Bold"}
  - keys: "Ctrl+I"
    action: {de: "Kursiv", en: "Italic"}
  - keys: "Ctrl+Shift+X"
    action: {de: "Durchgestrichen", en: "Strikethrough"}
  - keys: "Ctrl+E"
    action: {de: "Inline-Code", en: "Inline code"}
  # --- Überschriften ---
  - keys: "Ctrl+Shift+1"
    action: {de: "Überschrift 1", en: "Heading 1"}
  - keys: "Ctrl+Shift+2"
    action: {de: "Überschrift 2", en: "Heading 2"}
  - keys: "Ctrl+Shift+3"
    action: {de: "Überschrift 3", en: "Heading 3"}
  # --- Listen und Bloecke ---
  - keys: "Ctrl+Shift+8"
    action: {de: "Aufzählung", en: "Bullet list"}
  - keys: "Ctrl+Shift+9"
    action: {de: "Nummerierung", en: "Ordered list"}
  - keys: "Ctrl+Shift+B"
    action: {de: "Zitat", en: "Blockquote"}
  # --- Aktionen ---
  - keys: "Ctrl+Z"
    action: {de: "Rückgängig", en: "Undo"}
  - keys: "Ctrl+Shift+Z"
    action: {de: "Wiederholen", en: "Redo"}

faq:
  # === Allgemein ===
  - question:
      de: "Was ist Bibliogon?"
      en: "What is Bibliogon?"
    answer:
      de: "Bibliogon ist eine Open-Source-Plattform zum Schreiben und Exportieren von Büchern. Sie läuft komplett offline im Browser, speichert lokal in SQLite und ist über Plugins erweiterbar."
      en: "Bibliogon is an open-source platform for writing and exporting books. It runs entirely offline in the browser, stores locally in SQLite, and is extensible via plugins."
  - question:
      de: "Funktioniert Bibliogon offline?"
      en: "Does Bibliogon work offline?"
    answer:
      de: "Ja. Bibliogon nutzt SQLite und speichert alles lokal. Frontend und Backend laufen auf deinem Rechner. Nur Plugins die externe APIs nutzen (z.B. Grammatikprüfung via LanguageTool) brauchen Internet."
      en: "Yes. Bibliogon uses SQLite and stores everything locally. Frontend and backend run on your machine. Only plugins using external APIs (e.g. grammar checking via LanguageTool) need internet."
  - question:
      de: "Welches Format wird intern gespeichert?"
      en: "What format is used internally?"
    answer:
      de: "Kapitelinhalte werden als TipTap-JSON gespeichert - ein strukturiertes, maschinenlesbares Format. Beim Export wird dieses automatisch in Markdown konvertiert. Du kannst jederzeit zwischen WYSIWYG- und Markdown-Modus wechseln."
      en: "Chapter content is stored as TipTap JSON - a structured, machine-readable format. During export, this is automatically converted to Markdown. You can switch between WYSIWYG and Markdown mode at any time."

  # === Bücher und Kapitel ===
  - question:
      de: "Wie erstelle ich ein neues Buch?"
      en: "How do I create a new book?"
    answer:
      de: "Klicke auf 'Neues Buch' im Dashboard. Gib Titel und Autor ein (Pflichtfelder). Optional kannst du Untertitel, Sprache, Reihe und Band angeben. Nach dem Erstellen erscheint das Buch auf dem Dashboard."
      en: "Click 'New Book' on the dashboard. Enter title and author (required). Optionally add subtitle, language, series and volume. After creation, the book appears on the dashboard."
  - question:
      de: "Welche Kapiteltypen gibt es?"
      en: "What chapter types are available?"
    answer:
      de: "31 Kapiteltypen in 3 Gruppen: Front Matter (Half-Title, Titelseite, Copyright, Inhaltsverzeichnis, Widmung, Motto, Vorwort, Geleitwort, Prolog, Einleitung), Kapitel (regulaeres Kapitel, Sektion, Teil, Teil-Einleitung, Interludium), Back Matter (Epilog, Nachwort, Schlussfolgerung, Schlussgedanken, Über den Autor, Danksagung, Anhang, Literatur, Endnoten, Glossar, Stichwortverzeichnis, Impressum, Nächster Band, Weitere Bücher, Leseprobe, Call to Action). Alle waehlbar über das '+'-Dropdown in der Sidebar. Die Marketing-Typen (Weitere Bücher, Leseprobe, Call to Action) werden bei der Audiobook-Generierung per Default übersprungen."
      en: "31 chapter types in 3 groups: Front Matter (Half-Title, Title Page, Copyright, Table of Contents, Dedication, Epigraph, Preface, Foreword, Prologue, Introduction), Chapters (regular chapter, Section, Part, Part Intro, Interlude), Back Matter (Epilogue, Afterword, Conclusion, Final Thoughts, About the Author, Acknowledgments, Appendix, Bibliography, Endnotes, Glossary, Index, Imprint, Next in Series, Also By Author, Excerpt, Call to Action). All selectable via the '+' dropdown in the sidebar. Marketing types (Also By Author, Excerpt, Call to Action) are skipped by default during audiobook generation."
  - question:
      de: "Wie ordne ich Kapitel um?"
      en: "How do I reorder chapters?"
    answer:
      de: "Ziehe Kapitel per Drag-and-Drop in der Sidebar in die gewünschte Reihenfolge. Die Sortierung wird innerhalb der jeweiligen Sektion beibehalten (Front Matter, Kapitel, Back Matter)."
      en: "Drag and drop chapters in the sidebar to reorder them. Sorting is maintained within each section (Front Matter, Chapters, Back Matter)."

  # === Editor ===
  - question:
      de: "Was ist der Markdown-Modus?"
      en: "What is Markdown mode?"
    answer:
      de: "Im Editor kannst du zwischen WYSIWYG und Markdown umschalten (Button rechts in der Toolbar). Im Markdown-Modus siehst und bearbeitest du den Rohtext mit Markdown-Syntax. Im WYSIWYG-Modus siehst du den formatierten Text mit der Formatting-Toolbar."
      en: "In the editor you can switch between WYSIWYG and Markdown mode (button on the right of the toolbar). In Markdown mode you see and edit raw text with Markdown syntax. In WYSIWYG mode you see formatted text with the formatting toolbar."
  - question:
      de: "Wie funktioniert das automatische Speichern?"
      en: "How does autosave work?"
    answer:
      de: "Änderungen werden automatisch 800ms nach dem letzten Tastendruck gespeichert. In der Statusleiste unter dem Editor siehst du 'Speichert...' während des Speicherns und 'Gespeichert' wenn abgeschlossen. Du musst nie manuell speichern."
      en: "Changes are saved automatically 800ms after the last keystroke. In the status bar below the editor you see 'Saving...' during save and 'Saved' when complete. You never need to save manually."
  - question:
      de: "Was zeigt der Wortzähler?"
      en: "What does the word counter show?"
    answer:
      de: "Der Wortzähler in der Statusleiste zeigt die Anzahl der Wörter im aktuell ausgewählten Kapitel. Er aktualisiert sich in Echtzeit beim Tippen."
      en: "The word counter in the status bar shows the number of words in the currently selected chapter. It updates in real time as you type."

  # === Export ===
  - question:
      de: "Wie exportiere ich mein Buch?"
      en: "How do I export my book?"
    answer:
      de: "Klicke 'Exportieren...' in der Sidebar. Es öffnet sich ein Dialog wo du Format (EPUB, PDF, Word, HTML, Markdown, Projekt-ZIP), Buchtyp (E-Book, Taschenbuch, Hardcover) und Inhaltsverzeichnis-Tiefe wählen kannst. Optional kannst du die Kapitelreihenfolge für diesen Export anpassen."
      en: "Click 'Export...' in the sidebar. A dialog opens where you choose format (EPUB, PDF, Word, HTML, Markdown, Project ZIP), book type (eBook, Paperback, Hardcover) and table of contents depth. Optionally you can customize the chapter order for this export."
  - question:
      de: "Welche Export-Formate werden unterstützt?"
      en: "Which export formats are supported?"
    answer:
      de: "6 Formate: EPUB (E-Book), PDF (Druck), Word/DOCX (Lektorate), HTML (Web), Markdown (Rohtext), Projekt-ZIP (.bgp, komplette manuscripta-Projektstruktur). Der Export nutzt manuscripta und Pandoc im Hintergrund."
      en: "6 formats: EPUB (eBook), PDF (print), Word/DOCX (editing), HTML (web), Markdown (raw text), Project ZIP (.bgp, full manuscripta project structure). Export uses manuscripta and Pandoc under the hood."
  - question:
      de: "Was ist die Kapitelreihenfolge (Section Order)?"
      en: "What is the section order?"
    answer:
      de: "Die Kapitelreihenfolge bestimmt, welche Abschnitte in welcher Reihenfolge im exportierten Buch erscheinen (z.B. Inhaltsverzeichnis, Vorwort, Kapitel, Glossar, Impressum). Sie kann global in den Einstellungen und pro Export im Export-Dialog angepasst werden. Verschiedene Buchtypen (E-Book, Taschenbuch) können unterschiedliche Reihenfolgen haben."
      en: "The section order determines which sections appear in which order in the exported book (e.g. table of contents, preface, chapters, glossary, imprint). It can be customized globally in settings and per export in the export dialog. Different book types (eBook, paperback) can have different orders."

  # === Backup und Import ===
  - question:
      de: "Wie funktioniert das Backup?"
      en: "How does backup work?"
    answer:
      de: "Klicke 'Backup' im Dashboard. Alle Bücher, Kapitel und Assets werden als .bgb-Datei (Bibliogon Backup) exportiert. Zum Wiederherstellen klicke 'Restore' und wähle die .bgb-Datei. Achtung: .bgb-Dateien können nur über 'Restore' importiert werden, nicht über 'Import'."
      en: "Click 'Backup' on the dashboard. All books, chapters and assets are exported as .bgb file (Bibliogon Backup). To restore, click 'Restore' and select the .bgb file. Note: .bgb files can only be imported via 'Restore', not via 'Import'."
  - question:
      de: "Was ist der Unterschied zwischen Backup, Import und Export?"
      en: "What is the difference between backup, import and export?"
    answer:
      de: "Backup (.bgb) sichert ALLE Bücher mit allen Metadaten und stellt sie 1:1 wieder her. Import (.bgp/.zip) importiert ein einzelnes Buch aus einem write-book-template Projekt. Export erzeugt fertige Buchformate (EPUB, PDF) oder Projektstrukturen (.bgp) für ein einzelnes Buch. Die verschiedenen Dateiformate verhindern Verwechslungen."
      en: "Backup (.bgb) saves ALL books with all metadata and restores them 1:1. Import (.bgp/.zip) imports a single book from a write-book-template project. Export creates finished book formats (EPUB, PDF) or project structures (.bgp) for a single book. The different file formats prevent mix-ups."
  - question:
      de: "Kann ich ein bestehendes Projekt importieren?"
      en: "Can I import an existing project?"
    answer:
      de: "Ja. Klicke 'Import' im Dashboard und wähle eine .bgp-Datei (aus Bibliogon-Export) oder eine .zip-Datei (write-book-template Projektstruktur). Das Buch wird mit allen Kapiteln und Metadaten importiert."
      en: "Yes. Click 'Import' on the dashboard and select a .bgp file (from Bibliogon export) or a .zip file (write-book-template project structure). The book is imported with all chapters and metadata."

  # === Papierkorb ===
  - question:
      de: "Wie funktioniert der Papierkorb?"
      en: "How does the trash work?"
    answer:
      de: "Gelöschte Bücher werden standardmäßig in den Papierkorb verschoben (Soft-Delete). Klicke das Papierkorb-Icon im Dashboard um gelöschte Bücher zu sehen. Dort kannst du einzelne Bücher wiederherstellen oder endgültig löschen. 'Papierkorb leeren' loescht alle Bücher endgültig. In den Einstellungen kannst du unter 'delete_permanently' auch direktes Löschen ohne Papierkorb aktivieren."
      en: "Deleted books are moved to trash by default (soft delete). Click the trash icon on the dashboard to see deleted books. There you can restore individual books or permanently delete them. 'Empty trash' permanently deletes all books. In settings you can enable direct deletion without trash via 'delete_permanently'."

  # === Einstellungen ===
  - question:
      de: "Wo finde ich die Einstellungen?"
      en: "Where do I find the settings?"
    answer:
      de: "Klicke das Zahnrad-Icon im Dashboard. Die Einstellungen haben drei Bereiche: Allgemein (Sprache, Titel, Theme), Plugins (aktivieren/deaktivieren, Konfiguration), und Lizenzen (Premium-Plugin-Schlüssel)."
      en: "Click the gear icon on the dashboard. Settings have three sections: General (language, title, theme), Plugins (enable/disable, configuration), and Licenses (premium plugin keys)."
  - question:
      de: "Welche Themes gibt es?"
      en: "Which themes are available?"
    answer:
      de: "Drei Themes, jeweils mit Light- und Dark-Modus (6 Kombinationen): Warm Literary (Standard, Amber-Akzent, Serif-Schrift), Cool Modern (Blau, Sans-Serif), und Nord (Arktisch-Blau, inspiriert vom beliebten Nord-Farbschema). Das Theme wählst du in Einstellungen > Allgemein, Dark/Light Mode per Sonnen/Mond-Icon."
      en: "Three themes, each with light and dark mode (6 combinations): Warm Literary (default, amber accent, serif font), Cool Modern (blue, sans-serif), and Nord (arctic blue, inspired by the popular Nord color scheme). Choose the theme in Settings > General, toggle dark/light mode via the sun/moon icon."

  # === Plugins ===
  - question:
      de: "Welche Plugins sind verfügbar?"
      en: "Which plugins are available?"
    answer:
      de: "9 Plugins: Export (EPUB/PDF/DOCX/HTML), Hilfe (In-App Hilfe), Erste Schritte (Onboarding), Grammatik (LanguageTool), Kinderbuch (Bild-Layout), KDP (Amazon-Metadaten), Audiobook (TTS), Uebersetzung (DeepL/LLM), Manuskript-Tools (Stilpruefung). Alle Plugins sind kostenlos und koennen unter Einstellungen > Plugins aktiviert werden."
      en: "9 plugins: Export (EPUB/PDF/DOCX/HTML), Help (in-app help), Get Started (onboarding), Grammar (LanguageTool), Children's Book (image layout), KDP (Amazon metadata), Audiobook (TTS), Translation (DeepL/LLM), Manuscript Tools (style checks). All plugins are free and can be activated under Settings > Plugins."
  - question:
      de: "Kann ich eigene Plugins hinzufügen?"
      en: "Can I add custom plugins?"
    answer:
      de: "Ja. Unter Einstellungen > Plugins klicke 'Plugin hinzufügen'. Gib Name, Anzeigename und Beschreibung ein. Das Plugin braucht einen installierten Python-Entry-Point unter der Gruppe 'bibliogon.plugins'. Details zur Plugin-Entwicklung findest du im PluginForge-Wiki (github.com/astrapi69/pluginforge)."
      en: "Yes. Under Settings > Plugins click 'Add plugin'. Enter name, display name and description. The plugin needs an installed Python entry point under the group 'bibliogon.plugins'. Plugin development details are in the PluginForge wiki (github.com/astrapi69/pluginforge)."

  # === Erste Schritte ===
  - question:
      de: "Wo finde ich eine Einfuehrung?"
      en: "Where can I find an introduction?"
    answer:
      de: "Klicke das Raketen-Icon im Dashboard oder gehe zu 'Erste Schritte'. Dort findest du eine Schritt-für-Schritt-Anleitung mit Fortschrittsanzeige und kannst ein Beispielbuch erstellen um die Funktionen kennenzulernen."
      en: "Click the rocket icon on the dashboard or go to 'Get Started'. There you find a step-by-step guide with progress tracking and can create a sample book to explore the features."

  # === Dateiformate ===
  - question:
      de: "Was bedeuten die Dateiendungen .bgb, .bgp und .zip?"
      en: "What do the file extensions .bgb, .bgp and .zip mean?"
    answer:
      de: ".bgb (Bibliogon Backup) enthält ein komplettes Backup aller Bücher - nur über 'Restore' importierbar. .bgp (Bibliogon Project) enthält ein einzelnes Buch als Projektstruktur - über 'Import' importierbar. .zip sind externe write-book-template Projekte - ebenfalls über 'Import' importierbar. Die unterschiedlichen Endungen verhindern Verwechslungen."
      en: ".bgb (Bibliogon Backup) contains a complete backup of all books - only importable via 'Restore'. .bgp (Bibliogon Project) contains a single book as project structure - importable via 'Import'. .zip are external write-book-template projects - also importable via 'Import'. The different extensions prevent mix-ups."

  # === Buch-Metadaten ===
  - question:
      de: "Wie bearbeite ich Buch-Metadaten (ISBN, Verlag, Keywords)?"
      en: "How do I edit book metadata (ISBN, publisher, keywords)?"
    answer:
      de: "Öffne dein Buch im Editor und klicke 'Metadaten' in der Sidebar (unterhalb der Kapitelliste). Dort findest du 5 Sektionen: Allgemein (Untertitel, Edition, Datum), Verlag (Name, Stadt), ISBN/ASIN (E-Book, Taschenbuch, Hardcover), Marketing (Keywords, HTML-Beschreibung für Amazon, Rückseitentexte) und Design (Cover-Pfad, Custom CSS). Alle Felder werden pro Buch gespeichert."
      en: "Open your book in the editor and click 'Metadata' in the sidebar (below the chapter list). There you find 5 sections: General (subtitle, edition, date), Publisher (name, city), ISBN/ASIN (eBook, paperback, hardcover), Marketing (keywords, HTML description for Amazon, backpage texts) and Design (cover path, custom CSS). All fields are saved per book."
  - question:
      de: "Kann ich Metadaten von einem anderen Buch übernehmen?"
      en: "Can I copy metadata from another book?"
    answer:
      de: "Ja. Im Metadaten-Editor klicke 'Von Buch übernehmen'. Es werden Verlag, Stadt, Autoren-Bio und Custom CSS vom gewaehlten Buch kopiert. Buchspezifische Felder (ISBN, Cover, Beschreibung) bleiben unverändert."
      en: "Yes. In the metadata editor click 'Copy from book'. Publisher, city, author bio and custom CSS are copied from the selected book. Book-specific fields (ISBN, cover, description) remain unchanged."
  - question:
      de: "Welche Kapiteltypen gibt es jetzt?"
      en: "What chapter types are available now?"
    answer:
      de: "31 Kapiteltypen in 3 Gruppen: Front Matter (Half-Title, Titelseite, Copyright, Inhaltsverzeichnis, Widmung, Motto, Vorwort, Geleitwort, Prolog, Einleitung), Kapitel (regulaeres Kapitel, Sektion, Teil, Teil-Einleitung, Interludium), Back Matter (Epilog, Nachwort, Schlussfolgerung, Schlussgedanken, Über den Autor, Danksagung, Anhang, Literatur, Endnoten, Glossar, Stichwortverzeichnis, Impressum, Nächster Band, Weitere Bücher, Leseprobe, Call to Action). Alle waehlbar über das '+'-Dropdown in der Sidebar. Die Marketing-Typen (Weitere Bücher, Leseprobe, Call to Action) werden bei der Audiobook-Generierung per Default übersprungen."
      en: "31 chapter types in 3 groups: Front Matter (Half-Title, Title Page, Copyright, Table of Contents, Dedication, Epigraph, Preface, Foreword, Prologue, Introduction), Chapters (regular chapter, Section, Part, Part Intro, Interlude), Back Matter (Epilogue, Afterword, Conclusion, Final Thoughts, About the Author, Acknowledgments, Appendix, Bibliography, Endnotes, Glossary, Index, Imprint, Next in Series, Also By Author, Excerpt, Call to Action). All selectable via the '+' dropdown in the sidebar. Marketing types (Also By Author, Excerpt, Call to Action) are skipped by default during audiobook generation."
  # --- Plugin-Installation ---
  - question:
      de: "Wie installiere ich ein Drittanbieter-Plugin?"
      en: "How do I install a third-party plugin?"
    answer:
      de: "Gehe zu Einstellungen > Plugins und klicke 'ZIP installieren'. Wähle die Plugin-ZIP-Datei aus. Das Plugin wird automatisch extrahiert, registriert und aktiviert. Die ZIP-Datei muss eine plugin.yaml und ein Python-Paket mit plugin.py enthalten."
      en: "Go to Settings > Plugins and click 'Install ZIP'. Select the plugin ZIP file. The plugin is automatically extracted, registered, and activated. The ZIP file must contain a plugin.yaml and a Python package with plugin.py."
  - question:
      de: "Wie deinstalliere ich ein Plugin?"
      en: "How do I uninstall a plugin?"
    answer:
      de: "Installierte Plugins koennen über Einstellungen > Plugins deaktiviert oder vollständig entfernt werden. Beim Entfernen werden die Plugin-Dateien und die Konfiguration gelöscht."
      en: "Installed plugins can be disabled or completely removed via Settings > Plugins. Removing a plugin deletes the plugin files and its configuration."
  - question:
      de: "Koennen Plugins eigene UI-Komponenten mitbringen?"
      en: "Can plugins provide their own UI components?"
    answer:
      de: "Ja. Plugins deklarieren UI-Erweiterungen über ein Manifest (get_frontend_manifest). Vordefinierte Slots: Sidebar-Aktionen, Toolbar-Buttons, Editor-Panels, Einstellungen-Abschnitte, Export-Optionen. Für komplexe UIs koennen Plugins Web Components als Custom Elements liefern."
      en: "Yes. Plugins declare UI extensions via a manifest (get_frontend_manifest). Predefined slots: sidebar actions, toolbar buttons, editor panels, settings sections, export options. For complex UIs, plugins can ship Web Components as Custom Elements."
  # --- Deployment ---
  - question:
      de: "Wie starte ich Bibliogon in Produktion?"
      en: "How do I start Bibliogon in production?"
    answer:
      de: "Kopiere .env.example nach .env, setze BIBLIOGON_SECRET_KEY auf einen zufaelligen Wert, und fuehre 'make prod' aus. Die App ist dann unter Port 8080 erreichbar. Daten werden in einem Docker-Volume persistent gespeichert."
      en: "Copy .env.example to .env, set BIBLIOGON_SECRET_KEY to a random value, and run 'make prod'. The app will be available on port 8080. Data is persistently stored in a Docker volume."
  # === Vorlagen ===
  - question:
      de: "Was sind Vorlagen und welche sind mitgeliefert?"
      en: "What are templates and which ones ship with Bibliogon?"
    answer:
      de: "Vorlagen sind wiederverwendbare Strukturen. Buchvorlagen fuellen ein neues Buch mit einer Kapitelliste (Titel, Typ, Reihenfolge); 5 Genres sind mitgeliefert: Kinderbilderbuch, Science-Fiction-Roman, Sachbuch / How-To, Philosophie, Memoiren. Kapitelvorlagen fuellen ein einzelnes Kapitel mit einer TipTap-JSON-Gliederung; 4 sind mitgeliefert: Interview, FAQ, Rezept, Fotoreportage. Mitgelieferte Vorlagen sind schreibgeschuetzt (Schloss-Badge), eigene Vorlagen kann man per Muelleimer-Button loeschen."
      en: "Templates are reusable structures. Book templates pre-fill a new book with a chapter list (title, type, order); 5 genres ship with the app: Children's Picture Book, Sci-Fi Novel, Non-Fiction / How-To, Philosophy, Memoir. Chapter templates pre-fill a single chapter with a TipTap JSON outline; 4 ship with the app: Interview, FAQ, Recipe, Photo Report. Built-in templates are read-only (lock badge); user templates are deletable via a trash icon."
  - question:
      de: "Wie erstelle ich ein Buch aus einer Vorlage?"
      en: "How do I create a book from a template?"
    answer:
      de: "Im Dashboard auf 'Neues Buch' klicken, am oberen Rand des Dialogs auf den Tab 'Aus Vorlage' wechseln, eine Karte auswaehlen, Titel und Autor eintragen und 'Erstellen' klicken. Sprache und Beschreibung sind aus der Vorlage vorbelegt, aber editierbar. Das Buch wird mit allen Kapiteln in einem einzigen Datenbank-Commit erstellt."
      en: "Click 'New Book' on the dashboard, switch to the 'From template' tab at the top of the dialog, pick a card, fill in title and author, and click 'Create'. Language and description are pre-filled from the template but editable. The book is created with all chapters in a single database commit."
  - question:
      de: "Wie speichere ich ein Buch als eigene Vorlage?"
      en: "How do I save a book as my own template?"
    answer:
      de: "Buch im Editor oeffnen, in der Sidebar-Fusszeile 'Als Vorlage speichern' anklicken. Name (Pflicht, eindeutig) und Beschreibung eintragen. Beim Content-Modus zwischen 'Leere Platzhalter' (nur Struktur, empfohlen) und 'Inhalt uebernehmen' (voller Kapiteltext) waehlen. 'Kapitelvorschau' ausklappen, um die Liste vor dem Speichern zu pruefen. Bei Namenskonflikt (409) zeigt das Namensfeld einen Inline-Fehler."
      en: "Open the book in the editor, click 'Save as template' in the sidebar footer. Enter a name (required, unique) and a description. For content mode pick 'Empty placeholders' (structure only, recommended) or 'Preserve content' (full chapter bodies). Expand 'Preview chapters' to confirm the list before saving. On name collision (409) the name field shows an inline error."
  - question:
      de: "Wie erstelle ich ein Kapitel aus einer Vorlage?"
      en: "How do I create a chapter from a template?"
    answer:
      de: "In der Editor-Sidebar auf das '+'-Icon klicken, in der Gruppe 'Kapitel' auf 'Aus Vorlage...' klicken. Eine Karte auswaehlen und auf 'Einfuegen' klicken. Das Kapitel wird am Ende der Liste angehaengt, mit Titel, Kapiteltyp und Inhalt aus der Vorlage. Den Titel kannst du per Doppelklick inline umbenennen."
      en: "In the editor sidebar, click the '+' icon, then 'From template...' in the 'Chapter' group. Pick a card and click 'Insert'. The chapter is appended with the title, chapter type, and content from the template. Double-click the title to rename inline."
  - question:
      de: "Wie speichere ich ein Kapitel als eigene Vorlage?"
      en: "How do I save a chapter as my own template?"
    answer:
      de: "Rechtsklick auf das Kapitel in der Sidebar, 'Als Vorlage speichern' aus dem Kontextmenue. Name (vorbelegt mit Kapiteltitel) und Beschreibung eintragen. 'Leerer Platzhalter' speichert nur die Struktur, 'Inhalt uebernehmen' kopiert den aktuellen Kapiteltext in die Vorlage."
      en: "Right-click the chapter in the sidebar and select 'Save as template' from the context menu. Enter a name (pre-filled with the chapter title) and a description. 'Empty placeholder' saves structure only; 'Preserve content' copies the current chapter body into the template."
  - question:
      de: "Wie loesche ich eine eigene Vorlage?"
      en: "How do I delete a user template?"
    answer:
      de: "Den Vorlagen-Picker oeffnen (Buch oder Kapitel). Eigene Vorlagen haben einen Muelleimer-Button in der Kartenkopfzeile. Klick darauf, Bestaetigungsdialog, fertig. Mitgelieferte Vorlagen (mit Schloss-Badge) haben diesen Button nicht und koennen nicht geloescht werden; der Server antwortet mit 403."
      en: "Open the template picker (book or chapter). User templates have a trash icon in the card header. Click it, confirm the dialog, and it's gone. Built-in templates (marked with a lock badge) do not have this icon and cannot be deleted; the server responds with 403."
  - question:
      de: "Wie importiere ich ein Buch aus einem Git-Repository?"
      en: "How do I import a book from a git repository?"
    answer:
      de: "Dashboard -> Importieren. Oben im Assistenten gibt es ein Feld 'Import aus einer Git-URL': URL einfuegen, 'Klonen + Importieren' klicken. Bibliogon klont das Repo in ein temporaeres Verzeichnis und importiert es wie ein write-book-template-Projekt. Aktuell nur oeffentliche HTTPS-Repos; Authentifizierung, Branch-Auswahl und Smart-Merge folgen in spaeteren Phasen."
      en: "Dashboard -> Import. At the top of the wizard there is an 'Import from a git URL' field: paste a URL, click 'Clone + Import'. Bibliogon clones the repository into a temporary directory and imports it like a write-book-template project. Public HTTPS repos only in this version; authentication, branch selection, and smart-merge come in later phases."
