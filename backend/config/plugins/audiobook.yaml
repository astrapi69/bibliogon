plugin:
  name: audiobook
  display_name:
    de: Audiobook
    en: Audiobook
    es: Audiolibro
    fr: Livre audio
    el: Ηχητικό βιβλίο
  description:
    de: TTS-basierte Audiobook-Generierung aus Buchkapiteln
    en: TTS-based audiobook generation from book chapters
    es: Generacion de audiolibros basada en TTS a partir de capitulos de libros
    fr: Generation de livres audio basee sur TTS a partir de chapitres de livres
    el: Δημιουργία ηχητικών βιβλίων με TTS από κεφάλαια βιβλίων
  version: 1.0.0
  license: Proprietary
  depends_on:
  - export
  api_version: '1'
settings:
  engine: edge-tts
  language: de
  default_voice: ''
  merge: merged
  skip_types:
  - toc
  - imprint
  - index
  - bibliography
  - endnotes
  # When true, the TTS speaks an ordinal intro ("Erstes Kapitel") before
  # each chapter. Default off because most users do not want any spoken
  # header at all - the chapter title is no longer auto-prepended.
  read_chapter_number: false
  # NOTE: the former ``overwrite_existing`` plugin-global flag moved to
  # Book.audiobook_overwrite_existing. The flag now lives per book and is
  # set via the "Bestehende Dateien ueberschreiben" checkbox in the
  # audiobook metadata tab. The Alembic migration e5f6a7b8c9d0 seeds the
  # per-book column once from the legacy YAML value on upgrade.
elevenlabs:
  # ElevenLabs API key. Stored in plain text on disk - keep this file out
  # of version control. The Settings UI lets the user paste, test and
  # delete the key without editing this file by hand.
  api_key: ''
