plugin:
  name: ms-tools
  display_name:
    de: Manuskript-Werkzeuge
    en: Manuscript Tools
    es: Herramientas de Manuscrito
    fr: Outils de Manuscrit
    el: Εργαλεία Χειρογράφου
  description:
    de: Stilprüfung, Textbereinigung und Qualitätsanalyse für Manuskripte
    en: Style checking, text sanitization, and quality analysis for manuscripts
    es: Verificación de estilo, limpieza de texto y análisis de calidad para manuscritos
    fr: Vérification de style, nettoyage de texte et analyse de qualité pour manuscrits
    el: Έλεγχος στυλ, εκκαθάριση κειμένου και ανάλυση ποιότητας για χειρόγραφα
  version: 1.0.0
  license: MIT
  depends_on: []
  api_version: '1'
settings:
  max_sentence_length: 30
  # NOTE: the former ``languages`` list was removed in the plugin-settings
  # audit. It was never read by code; supported languages are derived from
  # the FILLER_WORDS / QUOTE_STYLES / VOWEL_GROUPS module-level constants.
  auto_sanitize_on_import: true
