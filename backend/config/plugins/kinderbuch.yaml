plugin:
  name: kinderbuch
  version: "1.0.0"
  license_tier: core
  depends_on:
    - export
  min_app_version: "0.9.0"
  entry_point: bibliogon_kinderbuch.plugin:KinderbuchPlugin
  display_name:
    de: "Kinderbuch"
    en: "Children's Book"
    es: "Libro infantil"
    fr: "Livre pour enfants"
    el: "Παιδικό βιβλίο"
  description:
    de: "Bild-pro-Seite Layouts für Kinderbilderbücher mit 4 Vorlagen"
    en: "Image-per-page layouts for children's picture books with 4 templates"
    es: "Diseños de imagen por página para libros infantiles con 4 plantillas"
    fr: "Mises en page image par page pour livres d'images avec 4 modeles"
    el: "Διατάξεις εικόνας ανά σελίδα για παιδικά βιβλία με 4 πρότυπα"

settings:
  image_position: "top"  # top, bottom, left, right, full
  max_image_width: 800
  max_image_height: 600
  default_font_size: 24
  page_background: "#ffffff"

templates:
  - id: "picture-top"
    label:
      de: "Bild oben"
      en: "Picture top"
    description:
      de: "Bild oben, Text unten"
      en: "Image on top, text below"
    layout: "image-top-text-bottom"
  - id: "picture-left"
    label:
      de: "Bild links"
      en: "Picture left"
    description:
      de: "Bild links, Text rechts"
      en: "Image left, text right"
    layout: "image-left-text-right"
  - id: "picture-full"
    label:
      de: "Ganzseitiges Bild"
      en: "Full-page image"
    description:
      de: "Bild ganzseitig mit Text-Overlay"
      en: "Full-page image with text overlay"
    layout: "image-full-text-overlay"
  - id: "text-only"
    label:
      de: "Nur Text"
      en: "Text only"
    description:
      de: "Reiner Textinhalt"
      en: "Text content only"
    layout: "text-only"
