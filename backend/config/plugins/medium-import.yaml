plugin:
  name: "medium-import"
  display_name:
    de: "Medium-Import"
    en: "Medium Import"
  description:
    de: "Importiert ein Medium-HTML-Archiv als Bibliogon-Artikel mit Publication-Eintrag und Provenienz."
    en: "Imports a Medium HTML archive as Bibliogon Articles with Publication entry and provenance."
  version: "1.0.0"
  license: "MIT"
  depends_on: []
  api_version: "1"

settings:
  # Whether to download referenced images from cdn-images-1.medium.com
  # to local storage (ArticleAsset rows + uploads/articles/{id}/imported_image/).
  # Default on per the v0.30.0 design decision: data sovereignty over
  # convenience; remote URLs may break.
  download_images: true

  # Per-image download timeout in seconds. cdn-images-1.medium.com is
  # usually fast, but the importer must not hang the whole batch on
  # one slow image.
  image_download_timeout_seconds: 30

  # If a canonical URL already matches an existing Article, skip the
  # import for that post. Set to false to re-import (overwrites
  # content + bumps imported_at). Application-layer dedup; no DB
  # uniqueness constraint.
  skip_existing_canonical_urls: true

  # Default status for imported articles. Medium posts are by
  # definition published; "published" mirrors that. User can
  # archive selectively post-import.
  default_status: "published"

  # Take the first image in the article body and use its URL as the
  # Article.featured_image_url. Default on because Medium posts
  # almost always have a header image and the dashboard's article
  # tile renders much better with a thumbnail. Disable for authors
  # who curate featured images manually.
  set_first_image_as_featured: true

  # MEDIUM-COMMENTS-IMPORT-01: how to handle posts that the walker
  # heuristic classifies as comments (short reply-shaped responses
  # with no structural elements; ~3-4% of a typical export).
  #
  #   - "as_comments" (default): route detected comments to the
  #     article_comments table. Keeps the article dashboard
  #     focused on long-form pieces while preserving the
  #     reply-shaped notes for a future comments admin view.
  #   - "as_articles": import every post as an Article, ignoring
  #     the heuristic. Legacy behaviour pre-v0.31.0.
  #   - "skip": discard comment-shaped posts entirely. For users
  #     who treat short replies as noise.
  import_comments_mode: "as_comments"

  # MEDIUM-COMMENTS-IMPORT-01: how to handle comments with no
  # responded-to article in the Bibliogon DB. Medium's HTML
  # export carries NO parent-article reference, so every
  # imported Medium comment is born an orphan; this setting
  # only matters for future importers that may carry parent
  # links.
  #
  #   - "store" (default): persist orphans with responds_to_
  #     article_id = NULL and responds_to_url preserved. The
  #     admin /api/comments endpoint surfaces them for later
  #     re-linkage when the responded-to article gets imported.
  #   - "skip": discard orphan comments entirely.
  orphan_comment_handling: "store"
