site_name: Bibliogon
site_description: Open-Source Book Authoring Platform
site_url: https://astrapi69.github.io/bibliogon/docs/
repo_url: https://github.com/astrapi69/bibliogon
repo_name: astrapi69/bibliogon
docs_dir: docs/help
theme:
  name: material
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: indigo
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: indigo
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - navigation.top
  - search.suggest
  - search.highlight
  - content.code.copy
  - content.tabs.link
  icon:
    repo: fontawesome/brands/github
plugins:
- search
- i18n:
    docs_structure: folder
    languages:
    - locale: de
      name: Deutsch
      default: true
      build: true
    - locale: en
      name: English
      build: true
      nav_translations:
        # AUTO-GENERATED-NAV-TRANSLATIONS-START (do not edit; regenerate via make sync-mkdocs-nav)
