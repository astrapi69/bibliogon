- git-revision-date-localized:
    enable_creation_date: true
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight
- pymdownx.inlinehilite
- pymdownx.tasklist:
    custom_checkbox: true
- toc:
    permalink: true
extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/astrapi69/bibliogon
