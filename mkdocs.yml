site_name: Bibliogon
site_description: Open-Source Book Authoring Platform
site_url: https://astrapi69.github.io/bibliogon/
repo_url: https://github.com/astrapi69/bibliogon
repo_name: astrapi69/bibliogon
docs_dir: docs/help
theme:
  name: material
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: indigo
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: indigo
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - navigation.top
  - search.suggest
  - search.highlight
  - content.code.copy
  - content.tabs.link
  icon:
    repo: fontawesome/brands/github
plugins:
- search
- i18n:
    docs_structure: folder
    languages:
    - locale: de
      name: Deutsch
      default: true
      build: true
    - locale: en
      name: English
      build: true
      nav_translations:
        Erste Schritte: Getting Started
        Uebersicht: Overview
        Formatierung: Formatting
        Manuskript-Tools: Manuscript Tools
        Vorlagen: Templates
        Windows-Launcher: Windows Launcher
        macOS-Launcher: macOS Launcher
        Linux-Launcher: Linux Launcher
        Deinstallieren: Uninstall
        KI-Assistent: AI Assistant
        Tastenkuerzel: Keyboard Shortcuts
        Git-Sicherung: Git Backup
        Grundlagen: Basics
        SSH-Schlüssel: SSH Keys
        Unterstützen: Support
        Glossar: Glossary
        Fehlerbehebung: Troubleshooting
        Plugin-Entwicklung: Plugin Development
        Home: Home
- git-revision-date-localized:
    enable_creation_date: true
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight
- pymdownx.inlinehilite
- pymdownx.tasklist:
    custom_checkbox: true
- toc:
    permalink: true
extra:
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/astrapi69/bibliogon
nav:
- Home: de/index.md
- Erste Schritte: de/getting-started.md
- Editor:
  - Uebersicht: de/editor/uebersicht.md
  - Formatierung: de/editor/formatierung.md
- Export:
  - EPUB: de/export/epub.md
  - PDF: de/export/pdf.md
  - Audiobook: de/export/audiobook.md
- Plugins:
  - Uebersicht: de/plugins/uebersicht.md
  - Manuskript-Tools: de/plugins/ms-tools.md
- Vorlagen: de/templates.md
- Installation:
  - Uebersicht: de/installation.md
  - Windows-Launcher: de/launcher-windows.md
  - macOS-Launcher: de/launcher-macos.md
  - Linux-Launcher: de/launcher-linux.md
  - Deinstallieren: de/uninstall.md
- KI-Assistent: de/ai.md
- Themes: de/themes.md
- Tastenkuerzel: de/shortcuts.md
- Git-Sicherung:
  - Grundlagen: de/git-backup/basics.md
  - Remote: de/git-backup/remote.md
  - SSH-Schlüssel: de/git-backup/ssh.md
- Unterstützen: de/support.md
- FAQ: de/faq.md
- Glossar: de/glossary.md
- Fehlerbehebung: de/troubleshooting.md
- Plugin-Entwicklung: de/developers/plugins.md
