services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - bibliogon-data:/app/data
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      # Single canonical data dir; matches docker-compose.prod.yml.
      # DB at $DATA_DIR/bibliogon.db, uploads at $DATA_DIR/uploads/,
      # both inside the named volume.
      - BIBLIOGON_DATA_DIR=/app/data

  frontend:
    image: node:24-slim
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  bibliogon-data:
  frontend-modules:
