plugin:
  name: medium-import
  version: "1.0.0"
  license_tier: core
  depends_on: []
  min_app_version: "0.30.0"
  entry_point: bibliogon_medium_import.plugin:MediumImportPlugin
  display_name:
    de: "Medium-Import"
    en: "Medium Import"
    es: "Importar de Medium"
    fr: "Importer depuis Medium"
    el: "Εισαγωγή από Medium"
    pt: "Importar do Medium"
    tr: "Medium'dan İçe Aktar"
    ja: "Medium からインポート"
  description:
    de: "Importiert ein Medium-HTML-Archiv (Einstellungen → 'Lade deine Daten herunter') als Bibliogon-Artikel mit Publication-Eintrag und Provenienz."
    en: "Imports a Medium HTML archive (Settings → 'Download your information') as Bibliogon Articles with Publication entry and provenance tracking."
    es: "Importa un archivo HTML de Medium (Ajustes → 'Descarga tu información') como artículos de Bibliogon con entrada Publication y seguimiento de procedencia."
    fr: "Importe une archive HTML Medium (Paramètres → 'Téléchargez vos informations') comme articles Bibliogon avec entrée Publication et suivi de provenance."
    el: "Εισάγει ένα αρχείο HTML του Medium (Ρυθμίσεις → 'Λήψη δεδομένων') ως άρθρα Bibliogon με εγγραφή Publication και παρακολούθηση προέλευσης."
    pt: "Importa um arquivo HTML do Medium (Configurações → 'Baixar suas informações') como artigos Bibliogon com entrada Publication e rastreamento de proveniência."
    tr: "Medium HTML arşivini (Ayarlar → 'Bilgilerinizi indirin') Bibliogon makaleleri olarak Publication kaydı ve köken takibiyle içe aktarır."
    ja: "Medium HTML アーカイブ (設定 → 「データのダウンロード」) を Publication エントリと出所追跡付きで Bibliogon 記事としてインポートします。"
