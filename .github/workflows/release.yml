name: Release

# One-click Gitflow release orchestration (release-workflow.md, gitflow #79).
#
# Triggered MANUALLY via the Actions tab (workflow_dispatch only -- never on
# push/PR). The mechanical release logic lives in Makefile targets
# (release-prepare / release-finish and their helpers) so it runs identically
# locally and in CI (DRY); this workflow only adds the CI-specific glue.
# Given a target version it runs:
#
#   make release-prepare  (preconditions -> cut release/v<version> from
#     develop -> bump-version + update-doc-headers + finalize-changelog ->
#     commit) -> make release-test (+ optional make test-e2e-smoke /
#     test-static-smoke) -> make release-finish (merge --no-ff to main ->
#     tag -> push main + tag -> back-sync develop -> delete release branch)
#     -> build the Linux launcher binary -> publish the GitHub Release.
#
# What this workflow does NOT do (deliberate, see release-workflow.md):
#   * It does NOT author CHANGELOG prose. The per-release notes file
#     changelog/releases/v<version>.md AND the docs/CHANGELOG.md entry are
#     a human/LLM precondition (Step 3); make release-prepare fails fast if
#     the notes file is missing. finalize-changelog only date-stamps an
#     "## [Unreleased]" block when present, or accepts an already-prepared
#     "## [<version>]".
#   * It builds + attaches only the LINUX launcher binary. The macOS /
#     Windows binaries come from launcher-{macos,windows}.yml on the
#     "release: created" event. NOTE: a Release created with the default
#     GITHUB_TOKEN does NOT trigger those workflows (GitHub suppresses event
#     cascades from GITHUB_TOKEN). To make them fire automatically, add a
#     repo secret RELEASE_PAT (a PAT with "repo" scope) -- the publish +
#     checkout steps prefer it. Without it, trigger those workflows manually
#     (workflow_dispatch) against the new tag.
#
# Caveats to be aware of:
#   * Pushing to main/develop requires the workflow token to be permitted
#     past any branch protection on those branches. If protection blocks
#     the GITHUB_TOKEN, configure RELEASE_PAT (used for checkout below) or
#     allow the actions bot.
#   * A safer two-phase variant (prepare -> human review -> finish) can be
#     built by splitting the gate steps from the merge/tag/publish steps
#     into two jobs gated by an environment approval; kept single-job here
#     to match the documented one-click flow.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.59.0, no leading v)"
        required: true
        type: string
      skip_e2e:
        description: "Skip E2E + static smoke (hotfixes only)"
        required: false
        type: boolean
        default: false

# Never run two releases concurrently; do NOT cancel an in-flight release
# (cancelling between the main push and the develop back-sync would leave
# the branches out of sync).
concurrency:
  group: release
  cancel-in-progress: false

# Defensive opt-in: any JavaScript-runtime action still declaring Node 20
# is coerced to Node 24 (see the standard-action bumps documented in
# ci.yml / release-gate.yml). Default Node 20 is removed 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release:
    name: Cut release v${{ inputs.version }}
    runs-on: ubuntu-22.04
    steps:
      - name: Validate version input
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: version '${{ inputs.version }}' is not X.Y.Z (no leading v)."
            exit 1
          fi
          echo "Releasing v${{ inputs.version }}"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Prefer a PAT (so downstream launcher-*.yml fire on the release
          # event and so pushes survive branch protection); fall back to
          # the built-in token.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install system dependencies
        # python3-tk: required by the launcher PyInstaller build smoke
        # inside `make release-test`. pandoc: required by export-plugin
        # tests + the export path exercised by the gate / E2E.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-tk pandoc

      - name: Install Poetry
        run: pip install poetry

      - name: Install all dependencies for the gate
        # `make release-test` exercises every subsystem: plugins + backend
        # + frontend (the test suite), docs (verify-docs-discipline) and
        # launcher (PyInstaller build smoke). Install them all here.
        run: |
          cd backend && poetry install --no-interaction --no-ansi && cd ..
          make install-plugins
          cd frontend && npm ci && cd ..
          cd docs && poetry install --no-interaction --no-ansi && cd ..
          cd launcher && poetry install --no-interaction --no-ansi && cd ..

      - name: Prepare release
        # Make target: preconditions (notes present + tag unused) -> cut
        # release/v<version> from develop -> bump-version + update-doc-headers
        # + finalize-changelog -> commit (explicit paths). Same target runs
        # locally.
        run: make release-prepare VERSION=${{ inputs.version }}

      - name: Run release gate
        # test (plugins+backend+frontend) + tsc + ruff + mypy + pre-commit
        # + verify-docs-{discipline,completeness} + verify-plugin-locks
        # + verify-theme + launcher PyInstaller build smoke.
        run: make release-test

      - name: E2E smoke
        if: ${{ !inputs.skip_e2e }}
        run: |
          cd e2e && npm ci && cd ..
          cd e2e && npx playwright install chromium --with-deps && cd ..
          make test-e2e-smoke

      - name: Static build smoke
        if: ${{ !inputs.skip_e2e }}
        run: make test-static-smoke

      - name: Finish release
        # Make target: verify pins -> merge --no-ff to main -> tag -> push
        # main + tag -> back-sync develop -> delete release branch.
        run: make release-finish VERSION=${{ inputs.version }}

      - name: Build launcher binary (Linux)
        # The Linux launcher binary is built + attached here so the release
        # ships at least one binary regardless of the GITHUB_TOKEN cascade
        # caveat. macOS/Windows binaries come from launcher-{macos,windows}.yml
        # on the "release: created" event (which needs RELEASE_PAT to fire,
        # see the header note).
        working-directory: launcher
        run: |
          poetry run pyinstaller bibliogon-launcher.spec --clean --noconfirm
          hash=$(sha256sum dist/bibliogon-launcher | awk '{print $1}')
          echo "$hash  bibliogon-launcher" > dist/bibliogon-launcher.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: Bibliogon v${{ inputs.version }}
          body_path: changelog/releases/v${{ inputs.version }}.md
          files: |
            launcher/dist/bibliogon-launcher
            launcher/dist/bibliogon-launcher.sha256
          draft: false
          prerelease: false
          # PAT (when configured) lets the launcher-*.yml workflows fire on
          # the resulting "release: created" event; GITHUB_TOKEN cannot.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
