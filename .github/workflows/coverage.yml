name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Defensive opt-in: any JavaScript-runtime action still declaring
# Node 20 (third-party or stragglers) is coerced to Node 24. After
# the 2026-05-14 standard-action bumps (checkout v5, setup-python v6,
# setup-node v5, upload-artifact v5, cache v5, configure-pages v5,
# upload-pages-artifact v5, deploy-pages v5, softprops/action-gh-release v3)
# every action we use natively runs on Node 24, so this is now a
# safety net for future additions rather than an active fix.
# Default Node 20 is removed September 16th 2026 per
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-interaction --no-ansi

      - name: Run backend coverage
        working-directory: backend
        run: |
          poetry run pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage
          path: |
            backend/htmlcov/
            backend/coverage.xml
          retention-days: 14

  plugin-coverage:
    name: Plugin Coverage (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - plugin: bibliogon-plugin-audiobook
            package: bibliogon_audiobook
          - plugin: bibliogon-plugin-export
            package: bibliogon_export
          - plugin: bibliogon-plugin-getstarted
            package: bibliogon_getstarted
          - plugin: bibliogon-plugin-grammar
            package: bibliogon_grammar
          - plugin: bibliogon-plugin-help
            package: bibliogon_help
          - plugin: bibliogon-plugin-kdp
            package: bibliogon_kdp
          - plugin: bibliogon-plugin-kinderbuch
            package: bibliogon_kinderbuch
          - plugin: bibliogon-plugin-ms-tools
            package: bibliogon_ms_tools
          - plugin: bibliogon-plugin-translation
            package: bibliogon_translation
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install plugin dependencies
        working-directory: plugins/${{ matrix.plugin }}
        run: poetry install --no-interaction --no-ansi

      - name: Run plugin coverage
        working-directory: plugins/${{ matrix.plugin }}
        run: |
          poetry run pytest tests/ \
            --cov=${{ matrix.package }} \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term

      - name: Upload plugin coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.plugin }}-coverage
          path: |
            plugins/${{ matrix.plugin }}/htmlcov/
            plugins/${{ matrix.plugin }}/coverage.xml
          retention-days: 14

  frontend-coverage:
    name: Frontend Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14
