name: Security Scan

# Dependency-security watcher (#149). The PR/push enforcement already
# lives in ci.yml (pip-audit + bandit + npm audit, all hard-blocking on
# every push/PR to main/develop). This watcher closes the remaining gap:
# new CVEs published against already-merged dependencies are invisible
# without a code change, because ci.yml only triggers on push/PR.
#
# Defense-in-depth Phase 2 (#278): the watcher now BLOCKS on Critical/High
# findings instead of warning. Concretely:
#   - pip-audit  real exit code; accepted advisories live in
#                .security-ignore.yml (parsed by scripts/security_ignore_args.py)
#                so nothing is ignored silently.
#   - bandit     High severity blocks; Low/Medium stay warn-only.
#   - npm audit  --audit-level=high with a real exit code.
# The trigger stays Weekly + manual dispatch (no PR trigger - that gate is
# ci.yml). A red here means a new advisory landed against a merged
# dependency; triage it, then either fix or add a justified entry to
# .security-ignore.yml.

on:
  schedule:
    - cron: "0 7 * * 0"  # weekly, Sunday 07:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-interaction --no-ansi

      - name: pip-audit (Phase 2 - blocks on non-ignored advisories)
        working-directory: backend
        run: |
          echo "=== pip-audit (dependency CVEs; --skip-editable drops path-installed plugins) ==="
          IGNORE=$(poetry run python ../scripts/security_ignore_args.py)
          echo "accepted advisories (see .security-ignore.yml): ${IGNORE:-none}"
          poetry run pip-audit --skip-editable $IGNORE

      - name: bandit (Phase 2 - High blocks, Low/Medium warn)
        working-directory: backend
        run: |
          echo "=== bandit High severity (blocking) ==="
          poetry run bandit -c pyproject.toml \
            -r app ../plugins ../scripts \
            --severity-level high --confidence-level medium -q
          echo "=== bandit Low/Medium severity (warn-only) ==="
          poetry run bandit -c pyproject.toml \
            -r app ../plugins ../scripts \
            --severity-level medium --confidence-level medium -q || true

  frontend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (Phase 2 - blocks on high + critical)
        working-directory: frontend
        run: |
          echo "=== npm audit (high + critical advisories) ==="
          npm audit --audit-level=high
