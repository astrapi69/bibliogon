name: Complexity Check

# Complexity watcher (#139). Defense-in-depth like the cohesion watcher
# (#113): visibility first, harden later. Phase 1 is pure visibility - every
# step ends with exit 0, even on findings, so the watcher never blocks a
# merge. Harder gating (blocking new violations) is a later phase.

on:
  pull_request:
    paths:
      - "backend/app/**/*.py"
      - "backend/pyproject.toml"
      - "frontend/src/**/*.ts"
      - "frontend/src/**/*.tsx"
      - "frontend/src/**/*.js"
      - "frontend/src/**/*.jsx"
      - ".github/workflows/complexity-check.yml"
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: radon + ruff C901 (warn-only)
        run: |
          python -m venv /tmp/cxenv
          /tmp/cxenv/bin/pip install --quiet --upgrade pip
          /tmp/cxenv/bin/pip install --quiet radon ruff
          echo "=== radon cyclomatic complexity (average; rank B and worse) ==="
          /tmp/cxenv/bin/radon cc backend/app/ -a -nb
          echo ""
          echo "=== radon: functions with rank E or F (complexity warning) ==="
          /tmp/cxenv/bin/radon cc backend/app/ -ne
          echo ""
          echo "=== ruff C901 (max-complexity=15, warn-only) ==="
          # --exit-zero: warn-only. C901 is deliberately NOT in the blocking
          # `select` of pyproject.toml; the threshold (max-complexity=15,
          # Phase 2 #279) comes from [tool.ruff.lint.mccabe]. The five legacy
          # functions above 15 carry `# noqa: C901`, so this surfaces only
          # NEW >15 functions.
          (cd backend && /tmp/cxenv/bin/ruff check app/ --select C901 --exit-zero)

  typescript-complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: ESLint complexity (warn-only)
        working-directory: frontend
        run: |
          npm ci
          echo "=== ESLint complexity (threshold 15, warn-only) ==="
          # `|| true`: the watcher never blocks (Phase 2 #279, still warn-only).
          # The `complexity` rule is NOT in the base eslint.config.js, so the
          # ~61 functions already above 15 surface here as warnings rather than
          # carrying ~61 inline disables (which would be churn across ~50 files
          # AND show as "unused directive" warnings in the base lint where the
          # rule is off). New violations are visible the same way. Counts +
          # rationale: docs/audits/clean-code-audit.md.
          npx eslint --rule 'complexity: ["warn", 15]' src/ || true
