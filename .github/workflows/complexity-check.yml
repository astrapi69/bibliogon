name: Komplexitäts-Check

# Komplexitäts-Watcher (#139). Defense-in-Depth wie der Kohäsions-Watcher
# (#113): Sichtbarkeit zuerst, härter schalten später. Phase 1 ist reine
# Visibility - jeder Schritt endet mit exit 0, auch bei Findings, damit der
# Watcher nie einen Merge blockiert. Härteres Schalten (Blocker für neue
# Verstöße) ist eine spätere Phase.

on:
  pull_request:
    paths:
      - "backend/app/**/*.py"
      - "backend/pyproject.toml"
      - "frontend/src/**/*.ts"
      - "frontend/src/**/*.tsx"
      - "frontend/src/**/*.js"
      - "frontend/src/**/*.jsx"
      - ".github/workflows/complexity-check.yml"
  schedule:
    - cron: "0 6 * * 1"  # wöchentlich, Montag 06:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: radon + ruff C901 (warn-only)
        run: |
          python -m venv /tmp/cxenv
          /tmp/cxenv/bin/pip install --quiet --upgrade pip
          /tmp/cxenv/bin/pip install --quiet radon ruff
          echo "=== radon Cyclomatic Complexity (Average; Rank B und schlechter) ==="
          /tmp/cxenv/bin/radon cc backend/app/ -a -nb
          echo ""
          echo "=== radon: Funktionen mit Rank E oder F (Komplexitäts-Warnung) ==="
          /tmp/cxenv/bin/radon cc backend/app/ -ne
          echo ""
          echo "=== ruff C901 (max-complexity=20, warn-only) ==="
          # --exit-zero: warn-only. C901 ist bewusst NICHT im blockierenden
          # `select` der pyproject.toml; die Schwelle (max-complexity=20)
          # kommt aus [tool.ruff.lint.mccabe].
          (cd backend && /tmp/cxenv/bin/ruff check app/ --select C901 --exit-zero)

  typescript-complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: ESLint complexity (warn-only)
        working-directory: frontend
        run: |
          npm ci
          echo "=== ESLint complexity (Schwelle 20, warn-only) ==="
          # `|| true`: der Watcher blockiert nie (Phase 1, reine Visibility).
          npx eslint --rule 'complexity: ["warn", 20]' src/ || true
