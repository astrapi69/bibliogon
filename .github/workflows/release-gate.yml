name: Release Gate

# Validates that every subsystem version is in lock-step with the
# canonical backend/pyproject.toml AND that the pushed tag matches.
# Runs on every v*.*.* tag push so failure is visible before the
# GitHub Release event triggers downstream artifact builds.
#
# This workflow is informational + advisory: tag pushes cannot be
# blocked by CI, so a failure here does NOT prevent the tag from
# existing on origin. But the launcher build workflows
# (launcher-{linux,macos,windows}.yml) re-run the same gate as the
# first step of their release-event jobs, which DOES block artifact
# attachment on failure.
#
# release-workflow.md Step 4 is the human-side checklist; this is
# the machine-side enforcement.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Defensive opt-in: any JavaScript-runtime action still declaring
# Node 20 (third-party or stragglers) is coerced to Node 24. After
# the 2026-05-14 standard-action bumps (checkout v5, setup-python v6,
# setup-node v5, upload-artifact v6, cache v5, configure-pages v6,
# upload-pages-artifact v5, deploy-pages v5, softprops/action-gh-release v3)
# every action we use natively runs on Node 24, so this is now a
# safety net for future additions rather than an active fix.
# Default Node 20 is removed September 16th 2026 per
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-versions:
    name: Verify version lock-step
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Tag matches canonical
        # Strip leading "v" from refs/tags/vX.Y.Z, compare to the
        # version field in backend/pyproject.toml. Drift here means
        # someone tagged before bumping (or vice versa).
        run: |
          CANONICAL=$(grep -E '^version\s*=' backend/pyproject.toml \
            | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag:        $GITHUB_REF_NAME"
          echo "Canonical:  $CANONICAL"
          if [[ "$CANONICAL" != "$TAG_VERSION" ]]; then
            echo
            echo "FATAL: tag $GITHUB_REF_NAME does not match canonical"
            echo "       version $CANONICAL in backend/pyproject.toml."
            echo "       Did you forget to bump pyproject before tagging?"
            exit 1
          fi
          echo "OK: tag matches canonical."

      - name: Verify version pins
        # The same script the release-workflow rule's Step 4 calls
        # locally before tagging. Catches every regression class:
        # canonical-pin drift, install.sh template drift, hardcoded
        # __version__ literals, deprecated COMPATIBLE_VERSION,
        # frontend APP_VERSION constants.
        run: |
          chmod +x scripts/verify_version_pins.sh
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/verify_version_pins.sh "$VERSION"

      - name: Verify subsystem lock-step
        # Confirms every derived subsystem (launcher pyproject + spec
        # plist + __init__, plugin pyprojects, frontend package.json,
        # install.sh) carries the canonical version. sync-versions
        # --check exits 1 on any drift.
        run: |
          chmod +x scripts/sync_versions.py
          python3 scripts/sync_versions.py --check

  verify-build-infra:
    name: Verify build infrastructure
    # Closes the gap identified by the release-automation audit
    # (docs/audits/release-automation-audit-2026-05-19.md Track D4):
    # release-workflow.md Step 5 mandates verify-plugin-locks +
    # verify-docs-discipline + launcher PyInstaller build smoke as
    # pre-tag gates, but the previous release-gate only checked
    # version-pin lock-step. A forgotten Step 5 check could ship to
    # main with no CI coverage. This job adds the build-infra
    # checks. Runs in parallel with verify-versions for faster
    # wall-clock; either job's failure blocks the gate.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        # tkinter is not bundled with the manylinux Python wheels used
        # by actions/setup-python on Linux runners. Required by the
        # launcher build smoke (mirrors launcher-linux.yml's pattern).
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Verify plugin locks
        # Catches the v0.30.0-style drift where the backend's combined
        # lock and the per-plugin locks diverge after a shared-dep pin
        # bump. The local pre-push hook + make verify-plugin-locks
        # also run this; CI is the backstop.
        run: make verify-plugin-locks

      - name: Install docs deps
        # MkDocs runs in its own Poetry env (docs/pyproject.toml).
        working-directory: docs
        run: poetry install --no-interaction --no-ansi

      - name: Verify docs discipline
        # Aggregates verify-mkdocs-nav (single-source-of-truth check
        # against docs/help/_meta.yaml) + check-mkdocs-orphans
        # (adversarial grep on `mkdocs build --strict` for orphan
        # pages). Mandatory since v0.30.0+ MKDOCS-DISCIPLINE-01.
        run: make verify-docs-discipline

      - name: Install launcher deps
        # PyInstaller + tkinter come from the launcher's poetry env.
        working-directory: launcher
        run: poetry install --no-interaction --no-ansi

      - name: Launcher PyInstaller build smoke
        # Catches spec errors that only surface when the spec is
        # exec'd by pyinstaller (not when imported as Python — see
        # the v0.26.x hotfix cluster). The downstream
        # launcher-{linux,macos,windows}.yml workflows also do this
        # build on `release: created`, but release-gate runs on tag
        # push (which fires BEFORE the release event), so this is
        # the earlier signal.
        working-directory: launcher
        run: poetry run pyinstaller bibliogon-launcher.spec --clean --noconfirm
