name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Defensive opt-in: any JavaScript-runtime action still declaring
# Node 20 (third-party or stragglers) is coerced to Node 24. After
# the 2026-05-14 standard-action bumps (checkout v5, setup-python v6,
# setup-node v5, upload-artifact v6, cache v5, configure-pages v6,
# upload-pages-artifact v5, deploy-pages v5, softprops/action-gh-release v3)
# every action we use natively runs on Node 24, so this is now a
# safety net for future additions rather than an active fix.
# Default Node 20 is removed September 16th 2026 per
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Cache Poetry's virtualenv keyed on poetry.lock + python
      # version. Saves ~15-30s per run on the backend job
      # (test-infrastructure-audit 2026-05-12 finding 0.5.1).
      # The frontend job already does this via setup-node's
      # ``cache: "npm"``; backend was the asymmetry.
      - name: Cache Poetry virtualenv (backend)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-backend-${{ runner.os }}-py3.12-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            poetry-backend-${{ runner.os }}-py3.12-

      - name: Install Poetry
        run: pip install poetry

      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-interaction --no-ansi

      # TIA (#332): pytest-testmon is a CI-only selector, installed ad-hoc into
      # the cached Poetry venv (kept out of the lockfile so it never reaches a
      # release). It builds a per-test impact map (.testmondata) and on later
      # runs runs only the tests affected by the changed files.
      - name: Install pytest-testmon
        working-directory: backend
        run: poetry run pip install pytest-testmon

      # Persist the testmon impact map across runs. Rolling key (github.run_id)
      # so the map is re-saved every run with the latest state; the restore-keys
      # prefix pulls the most recent prior map. A cache miss (new deps / first
      # ever run) leaves no .testmondata, so testmon runs + maps EVERYTHING =
      # full suite -> it can never under-test on a cold cache.
      - name: Restore testmon impact map
        uses: actions/cache@v5
        with:
          path: backend/.testmondata
          key: testmondata-${{ runner.os }}-py3.12-${{ hashFiles('backend/poetry.lock') }}-${{ github.run_id }}
          restore-keys: |
            testmondata-${{ runner.os }}-py3.12-${{ hashFiles('backend/poetry.lock') }}-

      # Dependency + SAST scanning is NOT duplicated on PRs: it runs weekly in
      # security-scan.yml (pip-audit + bandit + npm audit, blocking on
      # Critical/High, #278). One instance is enough (#289).

      # Test Impact Analysis: --testmon runs only the tests affected by the diff
      # (per the restored impact map); on a cold cache it runs + maps the whole
      # suite. Correctness (no false green): exit 0 = pass (affected tests
      # passed, or testmon deselected everything as unaffected); exit 1 = a real
      # failure -> propagate; exit >1 (collection/internal/usage error, exit 5 =
      # nothing collected) -> fall back to the FULL suite, which is
      # authoritative. The Nightly always runs the full suite regardless.
      - name: Run backend tests (testmon, full-suite fallback)
        working-directory: backend
        run: |
          set +e
          poetry run pytest tests/ --testmon -q
          code=$?
          set -e
          if [ "$code" -eq 5 ]; then
            echo "testmon: nothing collected; treating as pass."
            exit 0
          fi
          if [ "$code" -le 1 ]; then
            exit "$code"
          fi
          echo "testmon errored (exit $code); running FULL suite (authoritative)."
          poetry run pytest tests/ -q

  # Plugin test matrix moved to nightly.yml (#289): plugins almost never break
  # on a frontend/backend-core PR, and 10 parallel matrix jobs dominated PR
  # wall-clock. They run nightly + on-demand (workflow_dispatch).

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # fetch-depth: 0 so the TIA step (vitest --changed) can diff against the
      # PR base branch (origin/<base_ref>) / the prior commit (HEAD~1 on push).
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # npm audit moved to the weekly security-scan.yml (#289); no duplicate
      # dependency scan on every PR.

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      # Fail the build on any new circular dependency. Baseline is 0
      # (docs/audits/circular-deps-baseline.md). Run via npx (pinned
      # major): madge@8's optional typescript peer is <6.1 while the
      # frontend is on TS 6, so a pinned devDependency would break npm ci.
      - name: Circular dependency check (madge)
        working-directory: frontend
        run: npx --yes madge@8 --circular --extensions ts,tsx src/

      # Test Impact Analysis (#332): on a PR run only the Vitest files affected
      # by the diff against the base branch; on push diff against HEAD~1. This
      # is the fast PR path — the Nightly full suite is the safety net.
      #
      # Correctness (no false green): --passWithNoTests makes a backend-only PR
      # skip cleanly; if the base ref can't be resolved, OR the changed run
      # exits non-zero (a real test failure OR a vitest/git error), we fall
      # back to the FULL suite, which is authoritative. A failing changed test
      # therefore still fails the job (the full suite re-runs and re-fails it);
      # an infra hiccup can never silently pass.
      - name: Run Vitest (changed-only, full-suite fallback)
        working-directory: frontend
        run: |
          if [ -n "${BASE_REF:-}" ]; then
            git fetch --no-tags --quiet origin "$BASE_REF" || true
            SINCE="origin/$BASE_REF"
          else
            SINCE="HEAD~1"
          fi
          if git rev-parse --verify --quiet "$SINCE" >/dev/null; then
            echo "TIA: Vitest --changed $SINCE (fallback: full suite)"
            if npx vitest run --changed "$SINCE" --passWithNoTests; then
              echo "TIA: changed-only Vitest passed."
            else
              echo "TIA: changed-only run non-zero; running FULL suite (authoritative)."
              npx vitest run
            fi
          else
            echo "TIA: base ref '$SINCE' not found; running FULL Vitest suite."
            npx vitest run
          fi
        env:
          BASE_REF: ${{ github.base_ref }}

      - name: Build
        working-directory: frontend
        run: npx vite build

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run hooks on all files
        run: pre-commit run --all-files --show-diff-on-failure

  lint-and-type-check:
    name: Backend ruff + mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Reuse the same backend Poetry cache as the test job
      # (same key). Mypy needs the SQLAlchemy + Pydantic
      # stub-bearing venv that ``poetry install`` produces.
      - name: Cache Poetry virtualenv (backend)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-backend-${{ runner.os }}-py3.12-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            poetry-backend-${{ runner.os }}-py3.12-
      - name: Install Poetry
        run: pip install poetry
      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-interaction --no-ansi
      - name: ruff check
        working-directory: backend
        run: poetry run ruff check app/
      - name: mypy
        working-directory: backend
        run: poetry run mypy app/
