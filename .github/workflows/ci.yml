name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Defensive opt-in: any JavaScript-runtime action still declaring
# Node 20 (third-party or stragglers) is coerced to Node 24. After
# the 2026-05-14 standard-action bumps (checkout v5, setup-python v6,
# setup-node v5, upload-artifact v6, cache v5, configure-pages v6,
# upload-pages-artifact v5, deploy-pages v5, softprops/action-gh-release v3)
# every action we use natively runs on Node 24, so this is now a
# safety net for future additions rather than an active fix.
# Default Node 20 is removed September 16th 2026 per
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Cache Poetry's virtualenv keyed on poetry.lock + python
      # version. Saves ~15-30s per run on the backend job
      # (test-infrastructure-audit 2026-05-12 finding 0.5.1).
      # The frontend job already does this via setup-node's
      # ``cache: "npm"``; backend was the asymmetry.
      - name: Cache Poetry virtualenv (backend)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-backend-${{ runner.os }}-py3.12-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            poetry-backend-${{ runner.os }}-py3.12-

      - name: Install Poetry
        run: pip install poetry

      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-interaction --no-ansi

      # Dependency + SAST scanning is NOT duplicated on PRs: it runs weekly in
      # security-scan.yml (pip-audit + bandit + npm audit, blocking on
      # Critical/High, #278). One instance is enough (#289).

      - name: Run backend tests
        working-directory: backend
        # ``-q`` instead of ``-v``: 1601 tests printed verbose is
        # noise on a green run. Test-infrastructure audit
        # finding 0.5.4. Failures still print full traceback;
        # ``-q`` only quietens the per-test pass logs.
        run: poetry run pytest tests/ -q

  # Plugin test matrix moved to nightly.yml (#289): plugins almost never break
  # on a frontend/backend-core PR, and 10 parallel matrix jobs dominated PR
  # wall-clock. They run nightly + on-demand (workflow_dispatch).

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # npm audit moved to the weekly security-scan.yml (#289); no duplicate
      # dependency scan on every PR.

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      # Fail the build on any new circular dependency. Baseline is 0
      # (docs/audits/circular-deps-baseline.md). Run via npx (pinned
      # major): madge@8's optional typescript peer is <6.1 while the
      # frontend is on TS 6, so a pinned devDependency would break npm ci.
      - name: Circular dependency check (madge)
        working-directory: frontend
        run: npx --yes madge@8 --circular --extensions ts,tsx src/

      - name: Run Vitest
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npx vite build

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run hooks on all files
        run: pre-commit run --all-files --show-diff-on-failure

  lint-and-type-check:
    name: Backend ruff + mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Reuse the same backend Poetry cache as the test job
      # (same key). Mypy needs the SQLAlchemy + Pydantic
      # stub-bearing venv that ``poetry install`` produces.
      - name: Cache Poetry virtualenv (backend)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-backend-${{ runner.os }}-py3.12-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            poetry-backend-${{ runner.os }}-py3.12-
      - name: Install Poetry
        run: pip install poetry
      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-interaction --no-ansi
      - name: ruff check
        working-directory: backend
        run: poetry run ruff check app/
      - name: mypy
        working-directory: backend
        run: poetry run mypy app/
