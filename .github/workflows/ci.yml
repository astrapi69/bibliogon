name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache Poetry's virtualenv keyed on poetry.lock + python
      # version. Saves ~15-30s per run on the backend job
      # (test-infrastructure-audit 2026-05-12 finding 0.5.1).
      # The frontend job already does this via setup-node's
      # ``cache: "npm"``; backend was the asymmetry.
      - name: Cache Poetry virtualenv (backend)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-backend-${{ runner.os }}-py3.12-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            poetry-backend-${{ runner.os }}-py3.12-

      - name: Install Poetry
        run: pip install poetry

      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-interaction --no-ansi

      - name: Run backend tests
        working-directory: backend
        run: poetry run pytest tests/ -v

  plugin-tests:
    name: Plugin Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # Test-infrastructure audit finding 0.5.2: default
      # fail-fast=true makes a flake in one plugin mask real
      # failures in the others. coverage.yml already sets
      # this to false; the asymmetry with ci.yml was a bug.
      fail-fast: false
      matrix:
        plugin:
          - bibliogon-plugin-audiobook
          - bibliogon-plugin-export
          - bibliogon-plugin-getstarted
          - bibliogon-plugin-grammar
          - bibliogon-plugin-help
          - bibliogon-plugin-kdp
          - bibliogon-plugin-kinderbuch
          - bibliogon-plugin-ms-tools
          - bibliogon-plugin-translation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Per-plugin Poetry virtualenv cache, keyed on the
      # plugin's own poetry.lock. With 9 matrix jobs running in
      # parallel, this saves ~15-30s per matrix job on cache
      # hits. The plugin name in the key prevents cross-plugin
      # cache pollution (different deps per plugin).
      - name: Cache Poetry virtualenv (${{ matrix.plugin }})
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-${{ matrix.plugin }}-${{ runner.os }}-py3.12-${{ hashFiles(format('plugins/{0}/poetry.lock', matrix.plugin)) }}
          restore-keys: |
            poetry-${{ matrix.plugin }}-${{ runner.os }}-py3.12-

      - name: Install Poetry
        run: pip install poetry

      - name: Install plugin dependencies
        working-directory: plugins/${{ matrix.plugin }}
        run: poetry install --no-interaction --no-ansi

      - name: Run plugin tests
        working-directory: plugins/${{ matrix.plugin }}
        run: poetry run pytest tests/ -v

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run Vitest
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npx vite build

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run hooks on all files
        run: pre-commit run --all-files --show-diff-on-failure

  lint-and-type-check:
    name: Backend ruff + mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-interaction --no-ansi
      - name: ruff check
        working-directory: backend
        run: poetry run ruff check app/
      - name: mypy
        working-directory: backend
        run: poetry run mypy app/
