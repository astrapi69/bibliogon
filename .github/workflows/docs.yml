name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/help/**'
      - 'mkdocs.yml'
      - 'scripts/generate_mkdocs_nav.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Opt every JavaScript-runtime action (actions/checkout,
# actions/setup-python, actions/setup-node) into Node 24.
# Default Node 20 is deprecated per
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# (forced default June 2nd 2026, removed September 16th 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for git-revision-date plugin

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry

      - name: Install docs dependencies
        working-directory: ./docs
        run: poetry install --no-interaction

      - name: Generate navigation from _meta.yaml
        working-directory: ./docs
        run: poetry run python ../scripts/generate_mkdocs_nav.py

      - name: Build docs
        working-directory: ./docs
        run: poetry run mkdocs build -f ../mkdocs.yml --strict

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
